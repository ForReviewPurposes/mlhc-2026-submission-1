run:
  mode: "external_validation"
  seed: 42
  name: "external_validation_eicu"

data:
  id_col: "stay_id"
  outcome_col: "mortality"

fit:
  y_col: "mortality"
  positive: "1"

transform:
  drop_nonfinite_L_cols: true
  min_L_sd: 1e-4
  cap_llr: true
  llr_cap: 50

distance:
  ridge: 1e-4

risk_bins:
  breaks: [-Inf, -0.1, 2, Inf]
  labels: ["Low", "Ambiguous", "High"]

plots:
  width: 8.5
  height: 5.5
  dpi: 300

groups:
  enabled: true
  group_map_path: "data/mimiciv/metadata/mimic_group_map.csv"
  exclude_from_percentiles: ["anchor_age", "gender"]
  softplus_eps: 1e-12
  winsor_p: 0.01
  ecdf_log_eps: 1e-6
  atypical_threshold: 0.75

output:
  base_dir: "outputs"
  run_name: "external_validation_eicu"
  append_datetime: true

run_lookup:
  run_dir: "outputs/mimic_internal_validation_v1_20260415_093000"
  preferred_survival_model_path: ""

external_data:
  data_path: "data/eicu/processed/eicu_data.rds"
  hospital_col: "hospitalid"
  gender_col: "gender"
  duration_col: "duration_hours_from_24h"
  event_col: "event_after_24h"

hospitals:
  ids: [73, 264, 167, 386, 383, 328]

survival:
  enabled: true
  preferred_km_method: ""
  time_roc_hours: [48, 72, 96, 128]
